name: Build and Sign Release

# Builds all desktop installers when a new version tag is pushed.
# Windows artifacts are signed by SignPath.io (free for open source).
#
# Setup required before first use:
#   1. Register at https://signpath.io/ with your open-source project
#   2. Get approved (free for open-source — takes a few days)
#   3. Add repository secrets:
#      - SIGNPATH_API_TOKEN
#      - SIGNPATH_ORG_ID
#      - SIGNPATH_PROJECT_SLUG
#      - SIGNPATH_SIGNING_POLICY_SLUG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# softprops/action-gh-release needs write access to create/update the
# release and upload installer assets. Without this the publish job fails
# with "Resource not accessible by integration".
permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
      - run: npm ci
      # Build the core installers first — none of these need flatpak, so a
      # flatpak failure below no longer takes the whole Linux build down.
      - name: Build Linux installers
        run: npx electron-builder --linux AppImage deb rpm tar.gz -p never
      # Flatpak is best-effort: GitHub runners disallow *system* flatpak
      # config (ConfigureRemote not allowed), so everything runs as --user
      # and the step is non-fatal.
      - name: Build Flatpak (best-effort)
        continue-on-error: true
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y --noninteractive flathub \
            org.freedesktop.Platform//24.08 \
            org.freedesktop.Sdk//24.08 \
            org.electronjs.Electron2.BaseApp//24.08
          cd packaging/flatpak
          flatpak-builder --user --repo=repo --force-clean build-dir com.geektech.PrintForge3D.yml
          flatpak build-bundle repo 3dprintforge-${GITHUB_REF_NAME#v}.flatpak com.geektech.PrintForge3D
          cp *.flatpak ../../dist-electron/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-installers
          # Explicit extensions — `dist-electron/*` also sweeps up stray
          # tool binaries electron-builder caches there (e.g. pagent.exe).
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.rpm
            dist-electron/*.tar.gz
            dist-electron/*.flatpak

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build macOS installers (unsigned)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac dmg zip -p never
      - uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          # upload-artifact globs don't expand braces — list each extension.
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # appx (Microsoft Store) is omitted: its protocol/app Id can't start
      # with a digit ("3dprintforge"/"3DPrintForge") and Store submission
      # needs a real publisher identity. nsis + portable are the installers
      # users actually download.
      - name: Build Windows installers (nsis + portable)
        run: npx electron-builder --win nsis portable -p never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers-unsigned
          path: dist-electron/*.exe

  sign-windows:
    needs: build-windows
    runs-on: windows-latest
    # Only run signing job if SignPath secrets are configured
    if: ${{ github.repository == 'skynett81/3dprintforge' && vars.SIGNPATH_ENABLED == 'true' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-installers-unsigned
          path: unsigned
      - name: Submit to SignPath
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ secrets.SIGNPATH_ORG_ID }}
          project-slug: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ github.run_id }}
          wait-for-completion: true
          output-artifact-directory: signed
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers-signed
          path: signed/*.exe

  publish:
    needs: [build-linux, build-mac, sign-windows]
    if: always() && (needs.build-linux.result == 'success' || needs.build-mac.result == 'success' || needs.sign-windows.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -type f \( -name '*.exe' -o -name '*.appx' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.flatpak' -o -name '*.zst' -o -name '*.tar.gz' -o -name '*.dmg' -o -name '*.zip' \) -exec sha256sum {} \; | sed 's|\./||' > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.appx
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
            artifacts/**/*.flatpak
            artifacts/**/*.zst
            artifacts/**/*.tar.gz
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/SHA256SUMS.txt
