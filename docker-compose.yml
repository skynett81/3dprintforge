services:
  3dprintforge:
    build: .
    container_name: 3dprintforge
    # network_mode: host is required for LAN access to printers via MQTT (port 8883)
    # and for camera RTSPS streams (port 322).
    # This means EXPOSE in Dockerfile is informational only — all ports are accessible.
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./config.json:/app/config.json
      - ./data:/app/data
      - ./certs:/app/certs
    environment:
      - NODE_ENV=production
      # Uncomment to enable authentication:
      # - BAMBU_AUTH_PASSWORD=your-password
      # - BAMBU_AUTH_USERNAME=admin
      # Uncomment to run with demo printers (no real hardware needed):
      # - BAMBU_DEMO=true
      # Uncomment to wire up the Forge Slicer fork in service mode
      # (see website/docs/forge-slicer-setup.md):
      # - FORGE_SLICER_URL=http://127.0.0.1:8765
      # - FORGE_SLICER_TOKEN=optional-bearer-token
