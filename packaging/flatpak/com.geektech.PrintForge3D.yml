# Flatpak manifest for 3DPrintForge
# Build: flatpak-builder build-dir com.geektech.PrintForge3D.yml --force-clean --install --user
app-id: com.geektech.PrintForge3D
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
command: 3dprintforge
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=all
  - --filesystem=home
  - --filesystem=xdg-documents
  - --filesystem=xdg-download
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  - --own-name=com.geektech.PrintForge3D

modules:
  - name: printforge3d
    buildsystem: simple
    build-commands:
      - mkdir -p /app/3dprintforge
      - cp -r 3dprintforge-1.1.18/* /app/3dprintforge/
      - install -Dm755 launcher.sh /app/bin/3dprintforge
      - install -Dm644 com.geektech.PrintForge3D.desktop /app/share/applications/com.geektech.PrintForge3D.desktop
      - install -Dm644 icon.png /app/share/icons/hicolor/256x256/apps/com.geektech.PrintForge3D.png
      - install -Dm644 com.geektech.PrintForge3D.metainfo.xml /app/share/metainfo/com.geektech.PrintForge3D.metainfo.xml
    sources:
      - type: archive
        path: ../../dist-electron/3dprintforge-1.1.18.tar.gz
        strip-components: 0
      - type: file
        path: launcher.sh
      - type: file
        path: com.geektech.PrintForge3D.desktop
      - type: file
        path: icon.png
      - type: file
        path: com.geektech.PrintForge3D.metainfo.xml
